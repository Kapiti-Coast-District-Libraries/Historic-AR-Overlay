<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WebXR AR Image Overlay</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
}

/* DOM overlay container */
#overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:auto;
}

/* UI controls */
#controls{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.6);
  padding:12px;
  border-radius:8px;
  color:white;
}

/* Start button */
#startButton{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  padding:15px 25px;
  font-size:18px;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<div id="overlay">

  <div id="controls">
    Opacity
    <input id="opacitySlider" type="range" min="0" max="1" step="0.01" value="1">
  </div>

  <button id="startButton">Start AR</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
